# ============================================================
#  TecXPaneL — Nginx Config definitivo
#  /etc/nginx/sites-available/txpl-panel
#
#  Copia y activa:
#    cp txpl-nginx.conf /etc/nginx/sites-available/txpl-panel
#    ln -sf /etc/nginx/sites-available/txpl-panel /etc/nginx/sites-enabled/
#    nginx -t && systemctl reload nginx
# ============================================================

# ── Rate limiting ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=txpl_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=txpl_api:10m   rate=60r/m;

# ── Upstream del panel ───────────────────────────────────────
upstream txpl_backend {
    server 127.0.0.1:8585;
    keepalive 32;
}

# ── HTTP → redirige a HTTPS (activa tras instalar SSL) ───────
# Descomenta este bloque y comenta el server de abajo cuando tengas SSL:
#
# server {
#     listen 8080;
#     server_name TU_DOMINIO.COM;
#     return 301 https://$host:8443$request_uri;
# }

# ── Servidor principal ───────────────────────────────────────
server {
    listen 8080;
    # listen 8443 ssl http2;         # Descomenta tras SSL
    server_name _;                   # Cambia a tu dominio cuando lo tengas

    # ── SSL (certbot lo rellena automáticamente) ─────────────
    # ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Seguridad ────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=63072000" always;  # Solo con HTTPS

    # ── Tamaño máximo de subida (zips, archivos grandes) ────
    client_max_body_size 512M;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/txpl-access.log;
    error_log  /var/log/nginx/txpl-error.log;

    # ── Login: rate limit estricto ───────────────────────────
    location = /api/auth/login {
        limit_req zone=txpl_login burst=5 nodelay;
        proxy_pass         http://txpl_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Operaciones largas: subida, extracción, npm install/build ─
    location ~ ^/api/(files/upload|files/extract|apps/[0-9]+/(exec|install|build|start|extract|proxy)|plugins/[^/]+/(install|uninstall)) {
        proxy_pass         http://txpl_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;          # streaming directo al backend
        proxy_buffering     off;              # streaming de la respuesta en vivo
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── API REST ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=txpl_api burst=20 nodelay;
        proxy_pass         http://txpl_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── WebSocket — Stats en tiempo real ─────────────────────
    location /ws/stats {
        proxy_pass         http://txpl_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket — Terminal SSH ──────────────────────────────
    location /ws/terminal {
        proxy_pass         http://txpl_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend SPA ─────────────────────────────────────────
    location / {
        proxy_pass         http://txpl_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Cache de assets estáticos
        location ~* \.(js|css|png|jpg|ico|woff2|woff|ttf)$ {
            proxy_pass http://txpl_backend;
            expires    30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Bloquear acceso a archivos sensibles ─────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
