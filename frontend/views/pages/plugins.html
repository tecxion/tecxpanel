<div class="card">
  <div class="card-header">
    <div class="card-title"><i class="ti ti-puzzle"></i> Plugins del servidor</div>
    <button class="btn btn-sm" onclick="loadPlugins()"><i class="ti ti-refresh"></i></button>
  </div>
  <p style="color:var(--text-secondary);margin-bottom:1rem;font-size:13px">
    Instala software adicional en tu VPS directamente desde el panel, sin usar la terminal.
  </p>
  <div id="plugins-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem">
    <div class="empty-state"><i class="ti ti-loader"></i> Cargando plugins...</div>
  </div>

  <div id="plugin-console" style="display:none;margin-top:1.25rem">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <i class="ti ti-terminal-2" style="color:var(--accent)"></i>
      <span id="plugin-console-title" style="font-weight:600;font-size:13px">Consola</span>
      <span id="plugin-console-spinner" style="color:var(--accent);font-size:12px;margin-left:auto"><i class="ti ti-loader-2"></i> en ejecución...</span>
      <button class="btn btn-sm" onclick="document.getElementById('plugin-console').style.display='none'" title="Cerrar consola"><i class="ti ti-x"></i></button>
    </div>
    <pre id="plugin-console-output" style="background:#0c0e12;color:#d4d4d4;font-family:var(--mono);font-size:12px;line-height:1.5;padding:14px;border-radius:var(--radius);height:320px;overflow:auto;white-space:pre-wrap;word-break:break-word;margin:0;border:1px solid var(--border)"></pre>
  </div>
</div>
