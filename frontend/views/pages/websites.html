<div class="flex items-center gap-3 mb" style="margin-bottom:1.25rem">
  <button class="btn btn-primary" onclick="openModal('modal-new-site')">
    <i class="ti ti-plus"></i> Nuevo sitio web
  </button>
</div>
<div class="card">
  <div class="card-header">
    <div class="card-title"><i class="ti ti-world"></i> Sitios web gestionados</div>
    <button class="btn btn-sm" onclick="loadWebsites()"><i class="ti ti-refresh"></i></button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Dominio</th><th>Tipo</th><th>SSL</th><th>Estado</th><th>Creado</th><th>Acciones</th></tr></thead>
      <tbody id="websites-table">
        <tr><td colspan="6" class="empty-state">Sin sitios web aún</td></tr>
      </tbody>
    </table>
  </div>
</div>
