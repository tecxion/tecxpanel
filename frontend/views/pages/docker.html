<div class="flex items-center gap-3" style="margin-bottom:1.25rem; flex-wrap:wrap">
  <button class="btn btn-primary" onclick="openModal('modal-new-container')">
    <i class="ti ti-plus"></i> Crear contenedor
  </button>
  <button class="btn btn-primary" onclick="openDockerEditModal('dockerfile')">
    <i class="ti ti-file-code"></i> Editar Dockerfile
  </button>
  <button class="btn btn-primary" onclick="openDockerEditModal('compose')">
    <i class="ti ti-file-settings"></i> Editar Docker Compose
  </button>
  <button class="btn btn-sm" onclick="loadDockerContainers()" style="margin-left:auto"><i class="ti ti-refresh"></i> Actualizar</button>
</div>
<div class="card">
  <div class="card-header">
    <div class="card-title"><i class="ti ti-brand-docker"></i> Lista de contenedores en el sistema</div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nombre</th><th>Imagen</th><th>ID</th><th>Estado</th><th>Puertos</th><th>Acciones</th></tr></thead>
      <tbody id="docker-table">
        <tr><td colspan="6" class="empty-state">No se encontraron contenedores o Docker no está activo.</td></tr>
      </tbody>
    </table>
  </div>
</div>
