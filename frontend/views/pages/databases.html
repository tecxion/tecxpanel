<div class="flex items-center gap-3" style="margin-bottom:1.25rem">
  <button class="btn btn-primary" onclick="openModal('modal-new-db')">
    <i class="ti ti-plus"></i> Nueva base de datos
  </button>
</div>
<div class="card">
  <div class="card-header">
    <div class="card-title"><i class="ti ti-database"></i> Bases de datos</div>
    <button class="btn btn-sm" onclick="loadDatabases()"><i class="ti ti-refresh"></i></button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nombre</th><th>Tipo</th><th>Nombre de la BD</th><th>Usuario</th><th>Contraseña</th><th>Estado</th><th>Creado</th><th>Acciones</th></tr></thead>
      <tbody id="databases-table">
        <tr><td colspan="8" class="empty-state">Sin bases de datos aún</td></tr>
      </tbody>
    </table>
  </div>
</div>
