<div class="overview-grid">
  <div class="card">
    <div class="card-header">
      <div class="card-title"><i class="ti ti-user"></i> Cuenta</div>
    </div>
    <div id="settings-account" style="display:flex;flex-direction:column;gap:0.75rem"></div>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-title"><i class="ti ti-lock"></i> Cambiar contraseña</div>
    </div>
    <div class="form-group"><label>Contraseña actual</label><input type="password" id="set-pass-old"></div>
    <div class="form-group"><label>Nueva contraseña</label><input type="password" id="set-pass-new"></div>
    <div class="form-group"><label>Repite la nueva contraseña</label><input type="password" id="set-pass-new2"></div>
    <button class="btn btn-primary" onclick="changePassword()"><i class="ti ti-device-floppy"></i> Guardar contraseña</button>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-title"><i class="ti ti-lifebuoy"></i> Recuperación de contraseña</div>
    </div>
    <div class="form-group"><label>Email de recuperación</label><input type="email" id="set-rec-email" placeholder="admin@ejemplo.com"></div>
    <div class="form-group"><label>Pregunta de seguridad</label><input type="text" id="set-rec-question" placeholder="¿Nombre de tu primera mascota?"></div>
    <div class="form-group"><label>Nueva respuesta</label><input type="text" id="set-rec-answer" placeholder="Dejar en blanco para no cambiarla"></div>
    <div class="form-group"><label>Contraseña actual (para confirmar)</label><input type="password" id="set-rec-pass"></div>
    <button class="btn btn-primary" onclick="saveRecovery()"><i class="ti ti-device-floppy"></i> Guardar recuperación</button>
  </div>
</div>
<div class="card mt-2">
  <div class="card-header">
    <div class="card-title"><i class="ti ti-info-circle"></i> Acerca de TecXPaneL</div>
  </div>
  <div style="font-size:13px;color:var(--text-secondary);line-height:1.8">
    Panel de control para VPS. Backend en <span class="domain-pill">127.0.0.1:8585</span> tras Nginx.
    <br>Cierra sesión desde el botón <strong>Salir</strong> de la barra superior.
  </div>
</div>
