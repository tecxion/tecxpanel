<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════
   TecXPaneL — Página única (SPA) del panel de control
   Toda la interfaz vive en este archivo: la pantalla de login,
   la barra lateral de navegación, una <div class="page"> por cada
   sección (dashboard, sitios, apps, BDs, Docker, archivos...) y las
   ventanas modales. La lógica está en js/app.js y los estilos en
   css/styles.css. Los iconos (Tabler) y la terminal (xterm) se
   cargan desde CDN.
  ════════════════════════════════════════════════════════════
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TecXPaneL — Panel de Control VPS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=20260614n">
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="login-screen">
  <div class="login-box" id="login-box">
    <div class="login-logo">
      <div class="txpl-mark">TXPL</div>
      <p>TecXPaneL — Panel de Control VPS</p>
    </div>
    <div class="login-field">
      <label>Usuario</label>
      <input type="text" id="login-user" value="admin" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">
        <button type="button" class="pass-toggle" onclick="togglePassVis(this)" tabindex="-1" aria-label="Mostrar u ocultar contraseña"><i class="ti ti-eye"></i></button>
      </div>
    </div>
    <div class="login-field" id="login-2fa-field" style="display:none">
      <label>Código 2FA</label>
      <input type="text" id="login-code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000">
    </div>
    <button class="login-btn" onclick="doLogin()">Iniciar sesión</button>
    <div style="margin-top:14px;text-align:right">
      <a href="#" onclick="showForgotPasswordForm(event)" style="font-size:12px;color:var(--accent);text-decoration:none;transition:color var(--transition)" onmouseover="this.style.color='var(--accent2)'" onmouseout="this.style.color='var(--accent)'">¿Olvidaste tu contraseña?</a>
    </div>
    <p class="login-error" id="login-error">Credenciales incorrectas</p>
  </div>

  <div class="login-box" id="reset-box" style="display:none">
    <div class="login-logo">
      <div class="txpl-mark">TXPL</div>
      <p>Recuperar Contraseña</p>
    </div>
    
    <!-- Paso 1: Solicitar pregunta -->
    <div id="reset-step-1">
      <div class="login-field">
        <label>Usuario</label>
        <input type="text" id="reset-username" placeholder="admin">
      </div>
      <button class="login-btn" onclick="fetchSecurityQuestion()">Obtener pregunta de seguridad</button>
      <div style="margin-top:14px;text-align:center">
        <a href="#" onclick="showLoginForm(event)" style="font-size:12px;color:var(--text-secondary);text-decoration:none;transition:color var(--transition)" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">Volver a iniciar sesión</a>
      </div>
    </div>

    <!-- Paso 2: Responder y cambiar contraseña -->
    <div id="reset-step-2" style="display:none">
      <div class="login-field">
        <label>Pregunta de seguridad</label>
        <div id="reset-question-text" style="font-size:13px;color:var(--text-primary);background:var(--bg-app);padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border2);margin-bottom:10px;word-break:break-all;font-weight:500"></div>
      </div>
      <div class="login-field">
        <label>Respuesta</label>
        <input type="text" id="reset-answer" placeholder="Tu respuesta">
      </div>
      <div class="login-field">
        <label>Email de recuperación</label>
        <input type="email" id="reset-email" placeholder="admin@ejemplo.com">
      </div>
      <div class="login-field">
        <label>Nueva contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="reset-new-pass" placeholder="Mínimo 8 caracteres">
          <button type="button" class="pass-toggle" onclick="togglePassVis(this)" tabindex="-1" aria-label="Mostrar u ocultar contraseña"><i class="ti ti-eye"></i></button>
        </div>
      </div>
      <button class="login-btn" onclick="submitResetPassword()">Restablecer contraseña</button>
      <div style="margin-top:14px;text-align:center">
        <a href="#" onclick="showLoginForm(event)" style="font-size:12px;color:var(--text-secondary);text-decoration:none;transition:color var(--transition)" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">Volver a iniciar sesión</a>
      </div>
    </div>
    
    <p class="login-error" id="reset-error" style="color:var(--red);font-size:12px;text-align:center;margin-top:0.75rem;display:none"></p>
    <p class="login-success" id="reset-success" style="color:var(--green);font-size:12px;text-align:center;margin-top:0.75rem;display:none"></p>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar-mount">
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <span class="topbar-title" id="page-title">Dashboard</span>
      <span class="topbar-subtitle" id="server-hostname">—</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <span id="uptime-display" style="font-size:12px;color:var(--text-muted)"></span>
        <div class="badge badge-green" id="status-badge" style="display:none">
          <span style="font-size:10px">● Online</span>
        </div>
        <button class="btn btn-sm" onclick="doLogout()">
          <i class="ti ti-logout"></i> Salir
        </button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- ── DASHBOARD ── -->
      <div class="page active" id="page-dashboard"></div>

      <!-- ── TERMINAL ── -->
      <div class="page" id="page-terminal"></div>

      <!-- ── WEBSITES ── -->
      <div class="page" id="page-websites"></div>

      <!-- ── APPS ── -->
      <div class="page" id="page-apps"></div>

      <!-- ── DATABASES ── -->
      <div class="page" id="page-databases"></div>

      <!-- ── DOCKER ── -->
      <div class="page" id="page-docker"></div>

      <!-- ── N8N ── -->
      <div class="page" id="page-n8n"></div>

      <!-- ── CATÁLOGO ── -->
      <div class="page" id="page-catalog"></div>

      <!-- ── BACKUPS ── -->
      <div class="page" id="page-backups"></div>

      <!-- ── CRON ── -->
      <div class="page" id="page-cron"></div>

      <!-- ── MAIL ── -->
      <div class="page" id="page-mail"></div>

      <!-- ── DNS ── -->
      <div class="page" id="page-dns"></div>

      <!-- ── FILES ── -->
      <div class="page" id="page-files"></div>

      <!-- ── FIREWALL ── -->
      <div class="page" id="page-firewall"></div>

      <!-- ── SSL ── -->
      <div class="page" id="page-ssl"></div>

      <!-- ── LOGS ── -->
      <div class="page" id="page-logs"></div>

      <!-- ── PLUGINS ── -->
      <div class="page" id="page-plugins"></div>

      <!-- ── HELP ── -->
      <div class="page" id="page-help"></div>

      <!-- ── SETTINGS ── -->
      <div class="page" id="page-settings"></div>

    </div><!-- /content -->
  </main>
</div><!-- /app -->

<!-- ═══════════════════ MODALS ═══════════════════ -->
<div id="modals-mount"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/core.js?v=20260715"></script>
<script src="js/auth.js?v=20260715"></script>
<script src="js/dashboard.js?v=20260715"></script>
<script src="js/websites.js?v=20260715"></script>
<script src="js/apps.js?v=20260715"></script>
<script src="js/databases.js?v=20260715"></script>
<script src="js/files.js?v=20260715"></script>
<script src="js/firewall.js?v=20260715"></script>
<script src="js/ssl.js?v=20260715"></script>
<script src="js/settings.js?v=20260715"></script>
<script src="js/notifications.js?v=20260715"></script>
<script src="js/app.js?v=20260715"></script>
</body>
</html>
